<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>VortexRo — Palette Generator</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header>
    <div class="brand">
      <h1>Palette Generator</h1>
      <p class="sub">Recolor your class outfit — skin &amp; outline stay protected. <span id="buildId" class="build"></span></p>
    </div>
    <div class="toolbar">
      <label class="field">
        <span>Class</span>
        <select id="classSelect"></select>
      </label>
      <label class="field">
        <span>Slot</span>
        <select id="slotSelect" title="palette slot (clothes_color id) — its colours apply to every class"></select>
      </label>
      <button id="newSlotBtn" class="ghost" title="add a new slot">+ Slot</button>
      <button id="renameSlotBtn" class="ghost" title="rename this slot">Rename</button>
      <button id="delSlotBtn" class="ghost" title="delete this slot">Delete</button>
      <button id="saveProjBtn" class="ghost" title="download all your slots as a project file">Save project</button>
      <button id="loadProjBtn" class="ghost" title="restore slots from a project file">Load project</button>
      <input id="loadProjInput" type="file" accept="application/json,.json" hidden />
      <!-- Export .pal button removed for this build; re-add in a later build. -->
    </div>
  </header>

  <main>
    <!-- preview -->
    <section class="panel preview">
      <h2>Preview</h2>
      <div class="stage">
        <canvas id="spriteCanvas" width="240" height="280"></canvas>
      </div>
      <div class="frameNav">
        <button id="framePrev" title="rotate left">&#9664;</button>
        <span id="frameLabel" class="hint">no sprite</span>
        <button id="frameNext" title="rotate right">&#9654;</button>
      </div>
      <div class="frameNav">
        <button id="zoomOut" title="zoom out">&#8722;</button>
        <span id="zoomLabel" class="hint">2.0×</span>
        <button id="zoomIn" title="zoom in">&#43;</button>
      </div>
    </section>

    <!-- editor -->
    <section class="panel editor">
      <div class="panel-head">
        <h2>Colors</h2>
        <div class="head-actions">
          <select id="modeSelect" class="ghost" title="recolour algorithm">
            <option value="faithful">Faithful</option>
            <option value="varied">Varied (v1)</option>
          </select>
          <button id="setThemeBtn" class="ghost" title="use the current colours as this slot's palette — seeds every class you haven't edited">Set slot palette</button>
          <button id="randomBtn" class="ghost">Randomize</button>
          <button id="resetBtn" class="ghost">Reset</button>
        </div>
      </div>
      <p id="status" class="status"></p>
      <div id="zones" class="zones"></div>
    </section>

    <!-- palette reference -->
    <section class="panel ref">
      <h2>Palette <span class="legend">bordered = editable · dim = protected</span></h2>
      <canvas id="paletteCanvas" width="320" height="320"></canvas>
    </section>
  </main>

  <script src="dist/editor.bundle.js" defer></script>
</body>
</html>
